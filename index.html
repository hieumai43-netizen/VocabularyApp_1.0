<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Học từ vựng</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <header>
    <button class="icon">☰</button>
    <h2 id="appTitle">📖 Học từ vựng</h2>
    <button class="icon">🔍</button>
  </header>

  <div class="filters">
    <select id="categorySelect">
      <option value="all">Tất cả</option>
      <option value="life">Cuộc sống</option>
      <option value="work">Công việc</option>
      <option value="weather">Thời tiết</option>
      <option value="animal">Động vật</option>
      <option value="color">Màu sắc</option>
      <option value="sport">Thể thao</option>
      <option value="love">Tình yêu</option>
    </select>

    <select id="langSelect">
      <option value="ja">Nhật - Việt</option>
      <option value="en">Anh - Việt</option>
      <option value="cn">Trung - Việt</option>
      <option value="ko">Hàn - Việt</option>
    </select>

    <button class="setting">⚙️</button>
  </div>

  <div class="modeSwitch">
    <button id="modeStudy" class="active">📖 Học</button>
    <button id="modeListen">🎧 Nghe</button>
  </div>

  <!-- MODEL 1 -->
  <main id="studyMode">

    <div class="progressText">
      <span>Tiến độ hôm nay</span>
      <span id="todayProgress">1 / 2 từ</span>
    </div>
    <div class="progressBar">
      <div id="progressFill"></div>
    </div>

    <section class="card">
      <div class="topRow">
        <span class="star">★</span>
        <span id="counter" class="counter">1 / 2</span>
        <span id="status" class="status">Chưa nhớ</span>
      </div>

      <div id="mainWord" class="mainWord">...</div>
      <div id="mainRead" class="mainRead">...</div>
      <button id="speakMain" class="smallSpeak">🔊</button>

      <div class="wordTable">
        <div><b class="tag vi">VI</b><span id="vn">...</span></div>
        <div><b class="tag ja">JA</b><span id="ja">...</span><small id="kana"></small><button onclick="speak('ja')">🔊</button></div>
        <div><b class="tag en">EN</b><span id="en">...</span><small id="ipa"></small><button onclick="speak('en')">🔊</button></div>
        <div><b class="tag cn">CN</b><span id="cn">...</span><small id="pinyin"></small><button onclick="speak('cn')">🔊</button></div>
        <div><b class="tag ko">KO</b><span id="ko">...</span><small id="koRead"></small><button onclick="speak('ko')">🔊</button></div>
      </div>

      <div class="exampleBox">
        <h3>💬 Ví dụ</h3>
        <p><b class="tag vi">VI</b><span id="exVi"></span></p>
        <p><b class="tag ja">JA</b><span id="exJa"></span><button onclick="speakExample('ja')">🔊</button></p>
        <p><b class="tag en">EN</b><span id="exEn"></span><button onclick="speakExample('en')">🔊</button></p>
        <p><b class="tag cn">CN</b><span id="exCn"></span><button onclick="speakExample('cn')">🔊</button></p>
        <p><b class="tag ko">KO</b><span id="exKo"></span><button onclick="speakExample('ko')">🔊</button></p>
      </div>

      <div class="buttons">
        <button id="prevBtn">← Quay lại</button>
        <button id="nextBtn">Tiếp theo →</button>
      </div>
    </section>
  </main>

  <!-- MODEL 2 -->
  <main id="listenMode" class="hidden">

    <div class="listenTop">
      <span>🔊 Chế độ nghe tự động</span>
      <label class="switch">
        <input type="checkbox" id="autoToggle">
        <span></span>
      </label>
    </div>

    <section class="listenCard">
      <span id="listenCounter" class="counter">1 / 20</span>

      <div id="listenWord" class="listenWord">...</div>
      <div id="listenRead" class="listenRead">...</div>

      <button id="bigPlay" class="bigPlay">🔊</button>
      <p id="playingText">Đang chờ...</p>

      <div class="listenExample">
        <b id="listenLangTag" class="tag ja">JA</b>
        <span id="listenExampleText">...</span>
      </div>

      <div class="audioProgress">
        <span id="audioText">Từ 1 / 1000</span>
        <input type="range" id="audioRange" min="0" max="100" value="0">
      </div>

      <div class="audioControls">
        <button id="back15">↶<br><small>15s</small></button>
        <button id="pauseBtn" class="pause">▶</button>
        <button id="next15">↷<br><small>15s</small></button>
      </div>

      <div class="listenMenu">
        <button id="repeatBtn">Ⅱ<br><small>Tạm dừng</small></button>
        <button id="shuffleBtn">⏪<br><small>Tua chậm</small></button>
        <button id="loopBtn">⟳<br><small>Lặp từ</small></button>
        <button id="fastBtn">⏩<br><small>Tua nhanh</small></button>
      </div>
    </section>
  </main>

  <nav>
    <button>⌂<br>Trang chủ</button>
    <button>☷<br>Danh mục</button>
    <button class="centerBtn" id="bottomModeBtn">🎧</button>
    <button>▥<br>Thống kê</button>
    <button>⚙<br>Cài đặt</button>
  </nav>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
